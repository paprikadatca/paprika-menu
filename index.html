<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paprika Datça Menu</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      background: #f3eadc;
      color: #3b2416;
    }
    .card {
      width: min(92vw, 420px);
      text-align: center;
      padding: 48px 28px;
    }
    h1 {
      font-size: 46px;
      margin: 0 0 10px;
      letter-spacing: 1px;
    }
    p {
      margin: 0 0 30px;
      font-size: 16px;
      opacity: .75;
    }
    a {
      display: block;
      margin: 14px auto;
      padding: 16px 20px;
      border: 1px solid #3b2416;
      border-radius: 999px;
      color: #3b2416;
      text-decoration: none;
      font-size: 19px;
      max-width: 260px;
    }
    a:hover {
      background: #3b2416;
      color: #f3eadc;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Paprika</h1>
    <p>Datça</p>

    <a href="#tr">Türkçe Menü</a>
    <a href="#en">English Menu</a>
  </main>
</body>
</html>
