<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paprika Food & Drink</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="site">

    <section id="landing" class="landing page active">
      <div class="frame">
        <div class="logo">
          <div class="paprika">paprika</div>
          <div class="food">food & drink</div>
        </div>

        <div class="welcome">
          <div class="ornament"><span></span></div>
          <h1>HOŞ GELDİNİZ</h1>
          <p>Welcome</p>
          <div class="dots"></div>
        </div>

        <div class="select-text">
          <h2>LÜTFEN DİL SEÇİNİZ</h2>
          <p>PLEASE SELECT YOUR LANGUAGE</p>
        </div>

        <div class="language-grid">
          <button onclick="openMenu('tr')">
            <strong>TÜRKÇE</strong>
            <span>MENÜ</span>
            <i></i>
          </button>

          <button onclick="openMenu('en')">
            <strong>ENGLISH</strong>
            <span>MENU</span>
            <i></i>
          </button>
        </div>

        <footer class="landing-footer">
          <div class="dots"></div>
          <p>Paprika Food & Drink</p>
          <em>Datça</em>
          <div class="insta">@paprika.datca</div>
        </footer>
      </div>
    </section>

    <section id="menuPage" class="menu-page page">
      <div class="menu-sheet">

        <button class="back" onclick="goLanding()">←</button>

        <header class="menu-logo">
          <div class="paprika">paprika</div>
          <div class="food">food & drink</div>
        </header>

        <section class="today">
          <h1 id="todayTitle">BUGÜN NE YİYECEĞİZ?</h1>
          <div class="today-box" id="todayBox"></div>
        </section>

        <section class="menu-columns">
          <div class="col">
            <div id="mainDishes"></div>
            <div id="appetizers"></div>
          </div>

          <div class="divider"></div>

          <div class="col">
            <div id="toasts"></div>
            <div id="sandwiches"></div>
          </div>
        </section>

        <section class="drinks-box">
          <h2 id="drinksTitle">İÇECEKLER</h2>
          <div class="drinks-grid">
            <div id="drinks"></div>
            <div class="divider small"></div>
            <div id="alcohol"></div>
          </div>
        </section>

        <footer class="menu-footer">
          <span>@paprika.datca</span>
        </footer>

      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
