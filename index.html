<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paprika Datça Menü</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section id="languageScreen" class="page language-screen">
    <div class="logo">
      <img src="paprika_logo_transparent.png" alt="Paprika Food & Drink" class="logo-image">
    </div>

    <div class="welcome-block">
      <div class="welcome-tr">HOŞ GELDİNİZ</div>
      <div class="welcome-en">WELCOME</div>
    </div>

    <div class="select-text">
      LÜTFEN DİL SEÇİNİZ<br>
      <span>PLEASE SELECT YOUR LANGUAGE</span>
    </div>

    <div class="lang-buttons">
      <button class="lang-button" onclick="showMenu('tr')">
        TÜRKÇE
        <small>MENÜ</small>
      </button>

      <button class="lang-button" onclick="showMenu('en')">
        ENGLISH
        <small>MENU</small>
      </button>
    </div>

    <div class="footer">
      Paprika Food &amp; Drink<br>
      Datça<br>
      @paprika.datca
    </div>
  </section>

  <section id="menuScreen" class="page hidden">
    <button class="back-button" onclick="goBack()">←</button>

    <header class="menu-header">
      <img src="paprika_logo_transparent.png" alt="Paprika Food & Drink" class="logo-image menu-logo">
      <div class="menu-title" id="menuTitle">MENÜ</div>
    </header>

    <main id="menuContent"></main>

    <footer class="footer">
      @paprika.datca
    </footer>
  </section>

  <script src="app.js"></script>
</body>
</html>
