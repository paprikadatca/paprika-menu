<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paprika Datça Menü</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <section id="languageScreen" class="page language-screen">
    <div class="logo">
      <img
        src="paprika_logo_transparent.png"
        alt="Paprika Food & Drink"
        class="logo-image"
      >
    </div>

    <div class="welcome-block">
      <div class="welcome-tr">HOŞ GELDİNİZ</div>
      <div class="welcome-en">WELCOME</div>
    </div>

    <div class="select-text">
      LÜTFEN DİL SEÇİNİZ<br>
      <span>PLEASE SELECT YOUR LANGUAGE</span>
    </div>

    <div class="lang-buttons">
      <button class="lang-button" type="button" onclick="showMenu('tr')">
        TÜRKÇE
        <small>MENÜ</small>
      </button>

      <button class="lang-button" type="button" onclick="showMenu('en')">
        ENGLISH
        <small>MENU</small>
      </button>
    </div>

    <div class="footer">
      Paprika Food &amp; Drink<br>
      Datça<br>
      @paprika.datca
    </div>
  </section>

  <section id="menuScreen" class="page hidden">
    <button
      class="back-button"
      type="button"
      aria-label="Dil seçimine dön"
      onclick="goBack()"
    >
      ←
    </button>

    <header class="menu-header">
      <img
        src="paprika_logo_transparent.png"
        alt="Paprika Food & Drink"
        class="logo-image menu-logo"
      >

      <div class="menu-title" id="menuTitle">MENÜ</div>
    </header>

    <main id="menuContent"></main>

    <footer class="footer menu-footer">
      <a
        href="https://instagram.com/paprika.datca"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-link"
        aria-label="Paprika Datça Instagram hesabı"
      >
        <i class="bi bi-instagram" aria-hidden="true"></i>
        <span>@paprika.datca</span>
      </a>

      <a
        href="https://g.page/r/CTd38zjtD7s8EBM/review"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-link"
        aria-label="Google'da Paprika Datça için yorum yap"
      >
        <i class="bi bi-geo-alt-fill" aria-hidden="true"></i>
        <span>Google'da Bizi Değerlendirin</span>
      </a>

      <a
        href="tel:+905334185048"
        class="footer-link"
        aria-label="Paprika Datça'yı ara"
      >
        <i class="bi bi-telephone-fill" aria-hidden="true"></i>
        <span>0533 418 50 48</span>
      </a>
    </footer>
  </section>

  <script src="app.js"></script>
</body>
</html>
