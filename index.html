<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paprika Datça Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <section class="landing" id="landing">
      <div class="brand">Paprika</div>
      <div class="place">Datça</div>
      <div class="buttons">
        <button data-lang="tr">Türkçe Menü</button>
        <button data-lang="en">English Menu</button>
      </div>
    </section>

    <section class="menu hidden" id="menu">
      <header>
        <button class="back" id="back">←</button>
        <div>
          <div class="brand small">Paprika</div>
          <div class="place small-place">Datça</div>
        </div>
      </header>
      <div id="menuContent"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
