<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paprika Datça Menü</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="landing" class="page active">
      <div class="brand">
        <div class="brand-mark">PAPRIKA</div>
        <div class="brand-sub">Datça</div>
      </div>

      <div class="language-card">
        <button onclick="showMenu('tr')">Türkçe Menü</button>
        <button onclick="showMenu('en')">English Menu</button>
      </div>
    </section>

    <section id="menu" class="page">
      <header class="menu-header">
        <button class="back" onclick="goHome()">←</button>
        <div>
          <h1 id="menuTitle">Paprika</h1>
          <p id="menuSubtitle">Datça</p>
        </div>
      </header>

      <section class="specials">
        <h2 id="specialTitle">Günün Özeli</h2>
        <div id="specialList"></div>
      </section>

      <section id="menuList" class="menu-list"></section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
